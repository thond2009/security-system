version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: security
      POSTGRES_PASSWORD: security
      POSTGRES_DB: security_system
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SEC_DATABASE_URL: "postgresql://security:security@db:5432/security_system"
      SEC_REDIS_URL: "redis://redis:6379/0"
      SEC_JWT_SECRET: "dev-secret-change-in-production"
      SEC_CI_API_TOKEN: "ci-token-dev"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend
      - ./rules:/app/rules

  celery:
    build: ./backend
    command: celery -A backend.app.worker worker --loglevel=info
    environment:
      SEC_DATABASE_URL: "postgresql://security:security@db:5432/security_system"
      SEC_REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - db
      - redis

volumes:
  pgdata:
